<body style="margin: 0;background: #fff0;height: 100vh;">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        
        const initData = WebApp.initData;
        if (initData) {
            window.location.replace("/?initData=" + encodeURIComponent(initData));
        }
    </script>
</body>
