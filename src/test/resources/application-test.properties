spring.datasource.url=jdbc:h2:mem:taxi_test_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Admin
spring.security.user.name=admin
spring.security.user.password=test
spring.security.user.roles=ADMIN

# Telegram
telegram.bot.username=test_bot
telegram.bot.token=12345:test
web.app.url=https://test.com

# MapBox
mapbox.access.token=pk.test_test

# Tariffs
fare.calculation.strategy=DISTANCE_AND_TIME
fare.base=10
fare.perKm=5
fare.perMin=2
fare.currency=EUR
